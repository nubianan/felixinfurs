// ── Overlay sync ────────────────────────────────────────────────────
function syncOverlay(){
  const ov=document.getElementById("overlay");
  const port=isPort(),dim=port?IMG.portrait:IMG.landscape;
  const ia=dim.w/dim.h,vW=window.innerWidth,vH=window.innerHeight,va=vW/vH;
  let w,h,x,y;
  if(va>ia){h=vH;w=h*ia;x=(vW-w)/2;y=0}
  else{w=vW;h=w/ia;x=0;y=(vH-h)/2}
  Object.assign(ov.style,{left:x+"px",top:y+"px",width:w+"px",height:h+"px"});
}
syncOverlay();
window.addEventListener("resize",()=>{applyBg();syncOverlay();buildLightZones();buildDrips()});

  zones.forEach((z,i)=>{
    const d=document.createElement("div");
    d.className="lz";
    d.style.cssText=[`left:${z.l}%`,`top:${z.t}%`,`width:${z.w}%`,`height:${z.h}%`,
      `background:${z.grad}`,`animation:${z.anim} ${(0.10+i*.012).toFixed(3)}s ${z.ad}s infinite`].join(";");
    cont.appendChild(d);
  });
}
buildLightZones();

// ── Wax streams ─────────────────────────────────────────────────────
function buildDrips(){
  const drips=isPort()?DRPT:DRLS;
  ["wd1","wd2","wd3","wd4"].forEach((id,i)=>{
    const d=drips[i],el=document.getElementById(id);
    el.style.cssText=`position:absolute;left:${d.l}%;top:${d.t}%;width:1px;z-index:12;`+
      `background:linear-gradient(rgba(245,232,207,.86),rgba(245,232,207,0));`+
      `border-radius:0 0 1px 1px;animation:${d.a} ${d.dur} ${d.del} infinite ease-in`;
  });
}
buildDrips();

// ── Spawned wax drops ────────────────────────────────────────────────
const DROP_IV=[4000,5000,6000];
let dropIdx=0;
function spawnDrop(){
  const key=isPort()?"portrait":"landscape";
  const src=DROPSRC[key][Math.floor(Math.random()*DROPSRC[key].length)];
  const ov=document.getElementById("overlay");
  const drop=document.createElement("div");
  const jx=(Math.random()-.5)*.5;
  drop.style.cssText=["position:absolute",`left:calc(${src.l+jx}% - 3px)`,`top:${src.t}%`,
    "width:6px","height:9px",
    "background:radial-gradient(ellipse at 50% 28%,rgba(248,238,214,.96) 0%,rgba(234,220,190,.72) 52%,rgba(220,202,168,0) 100%)",
    "border-radius:50% 50% 55% 55% / 38% 38% 62% 62%",
    "pointer-events:none","z-index:13","opacity:0"].join(";");
  ov.appendChild(drop);
  drop.animate([
    {opacity:0,transform:"translateY(0) scale(.5)"},
    {opacity:.94,transform:"translateY(0) scale(1)",offset:.07},
    {opacity:.76,transform:"translateY(20px) scale(.86)",offset:.70},
    {opacity:0, transform:"translateY(38px) scale(.62)"}
  ],{duration:1900,easing:"ease-in"}).finished.then(()=>drop.remove());
}
function scheduleDrop(){
  const delay=DROP_IV[dropIdx%DROP_IV.length];dropIdx++;
  setTimeout(()=>{spawnDrop();scheduleDrop()},delay);
}

// ── Sheet music fly-in ───────────────────────────────────────────────
function flyInPages(){
  const key=isPort()?"portrait":"landscape";
  const pages=LAYOUTS[key];
  document.querySelectorAll(".sp").forEach((el,i)=>{
    el.innerHTML=PGSVG[i];
    const p=pages[i];
    el.style.width=isPort()?"14%":"9.5%";
    el.style.display="block";el.style.zIndex=14+i;
    el.style.opacity="0";el.style.left="13%";el.style.top="60%";
    el.style.transform="rotate(-50deg) scale(0.22)";
    el.style.pointerEvents="none";          // no clicks during animation
    setTimeout(()=>{
      el.style.animation=`${p.anim} ${p.dur}ms linear forwards`;
      el.addEventListener("animationend",()=>{
        el.style.animation="none";
        el.style.left=p.l+"%";el.style.top=p.t+"%";
        el.style.transform=`rotate(${p.rot}deg)`;el.style.opacity="1";
        el.style.pointerEvents="auto";      // ready for clicks
      },{once:true});
    },p.dly);
  });
}

// ── Hover titles (split on \n — safe, no regex) ─────────────────────
const ptEl=document.getElementById("ptitle");
let ttimer=null;
function showTitle(i){
  clearTimeout(ttimer);
  ptEl.innerHTML=PIECES[i].title.split("\n").join("<br>");
  ptEl.style.opacity="1";
}
function hideTitle(){ttimer=setTimeout(()=>{ptEl.style.opacity="0"},380)}

// ── Piano page logic ─────────────────────────────────────────────────
let activePianoIdx=-1;

function showPianoPage(idx){
  const key=isPort()?"portrait":"landscape";
  const pos=PIANO[key];
  const pp=document.getElementById("piano-page");
  pp.innerHTML=PGSVG[idx];
  pp.style.width=pos.w+"%";
  pp.style.left=pos.l+"%";
  pp.style.top=pos.t+"%";
  pp.style.transform=`${pos.persp||''} rotate(${pos.rot}deg)`;
  pp.style.opacity="0";
  pp.style.display="block";
  pp.getBoundingClientRect();              // force reflow
  pp.style.transition="opacity 0.9s ease";
  pp.style.opacity="1";
}

function hidePianoPage(then){
  const pp=document.getElementById("piano-page");
  pp.style.transition="opacity 1s ease";
  pp.style.opacity="0";
  setTimeout(()=>{pp.style.display="none";if(then)then();},1000);
}

function restoreFloorPage(idx){
  const key=isPort()?"portrait":"landscape";
  const p=LAYOUTS[key][idx];
  const el=document.getElementById("sp"+idx);
  el.style.left=p.l+"%";el.style.top=p.t+"%";
  el.style.transform=`rotate(${p.rot}deg)`;
  el.style.transition="opacity 1.2s ease";
  el.style.opacity="1";
  el.style.pointerEvents="auto";
}

// Called when real audio track finishes
function onTrackEnd(idx){
  if(activePianoIdx!==idx)return;
  activePianoIdx=-1;
  hidePianoPage();
  setTimeout(()=>restoreFloorPage(idx),300);
}

// ── Audio engine ─────────────────────────────────────────────────────
let ctx=null,activeGain=null,trackIv=null;
function ensureCtx(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==="suspended")ctx.resume()}
const CHORDS=[
  [[164.8,207.7,246.9,329.6],[196,246.9,293.7],[185,246.9,311.1],[220,277.2,329.6]],
  [[196,233.1,293.7,392],[174.6,220,261.6],[155.6,196,233.1],[185,246.9,293.7]],
  [[220,261.6,329.6],[196,246.9,293.7],[174.6,220,261.6],[164.8,207.7,246.9]],
  [[293.7,369.9,440,587.3],[329.6,415.3,493.9],[369.9,466.2,554.4],[329.6,415.3,493.9]],
  [[164.8,196,246.9],[146.8,185,220],[130.8,164.8,196],[123,155.6,185]]
];
const TIMING=[1900,1350,2300,1050,2100],WAVES=["sine","sawtooth","sine","triangle","sine"];
function stopSynth(){if(trackIv){clearInterval(trackIv);trackIv=null}}
function startSynth(idx,gainNode){
  stopSynth();
  const chords=CHORDS[idx],timing=TIMING[idx],wave=WAVES[idx];
  let ci=0,cur=[];
  function chord(){
    const t=ctx.currentTime;
    cur.forEach(n=>{n.g.gain.setValueAtTime(n.g.gain.value,t);n.g.gain.linearRampToValueAtTime(0,t+.95);setTimeout(()=>{try{n.o.stop()}catch(e){}},1000)});
    cur=[];
    chords[ci%chords.length].forEach((f,j)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type=wave;o.frequency.value=f;o.detune.value=j*3-3;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(j===0?.18:.09,t+.65);
      o.connect(g);g.connect(gainNode);o.start();cur.push({o,g});
    });ci++;
  }
  chord();trackIv=setInterval(chord,timing);
}

let aA=new Audio(),aB=new Audio(),uA=true;
function playReal(idx,src){
  const fi=uA?aA:aB,fo=uA?aB:aA;
  fi.src=src;fi.loop=false;fi.volume=0;fi.play();
  fi.onended=()=>onTrackEnd(idx);
  let t=0;const iv=setInterval(()=>{
    t+=.05;fi.volume=Math.min(1,t/3);fo.volume=Math.max(0,1-t/3);
    if(t>=3){clearInterval(iv);fo.pause();};
  },50);
  uA=!uA;
}

function startMusicForIdx(idx){
  const p=PIECES[idx];
  if(p.src){playReal(idx,p.src);return}
  // Synth demo
  const ng=ctx.createGain();ng.gain.setValueAtTime(0,ctx.currentTime);ng.connect(ctx.destination);
  if(activeGain){
    const old=activeGain;
    old.gain.setValueAtTime(old.gain.value||0,ctx.currentTime);
    old.gain.linearRampToValueAtTime(0,ctx.currentTime+2);
    setTimeout(stopSynth,2100);
  }
  activeGain=ng;ng.gain.linearRampToValueAtTime(1,ctx.currentTime+2);
  startSynth(idx,ng);
}

// ── Main playTrack ───────────────────────────────────────────────────
function playTrack(idx){
  ensureCtx();
  const prev=activePianoIdx;
  if(prev===idx)return;           // already showing this one

  // Restore previous floor page
  if(prev>=0){
    hidePianoPage();
    setTimeout(()=>restoreFloorPage(prev),300);
    stopSynth();
    // Crossfade out real audio if any
    [aA,aB].forEach(a=>{if(!a.paused){let t=0;const iv=setInterval(()=>{t+=.05;a.volume=Math.max(0,1-t/1.5);if(t>=1.5){clearInterval(iv);a.pause()}},50)}});
  }

  activePianoIdx=idx;
  document.getElementById("stop-catcher").style.display="block"; // enable click-to-stop

  // 1. Fade out floor page over 1 second
  const el=document.getElementById("sp"+idx);
  el.style.transition="opacity 1s ease";
  el.style.opacity="0";
  el.style.pointerEvents="none";

  // 2. After 1 second: show piano page + start music
  var _si=idx;
  setTimeout(()=>{
    if(activePianoIdx!==_si)return;
    showPianoPage(_si);
    startMusicForIdx(_si);
  },1000);

  // Update now-playing (split on \n — NO regex)
  const np=document.getElementById("np");
  np.textContent="Now Playing  ·  "+PIECES[idx].title.split("\n").join(" — ");
  np.style.opacity="1";
}

// ── Wire up page interactions ────────────────────────────────────────
document.querySelectorAll(".sp").forEach((el,i)=>{
  // Desktop: hover shows title
  el.addEventListener("mouseenter",()=>showTitle(i));
  el.addEventListener("mouseleave",()=>hideTitle());
  // Mobile: tap opens the selection overlay (no hover on touch)
  // ensureCtx() here so AudioContext is created in this user-gesture context
  el.addEventListener("touchstart",e=>{
    e.preventDefault();
    ensureCtx();
    showTapOverlay(i);
  },{passive:false});
  // Desktop: click plays directly
  el.addEventListener("click",()=>playTrack(i));
});

// ── Intro audio pad ─────────────────────────────────────────────────
let introDone=false;
function tryIntro(){if(!introDone){introDone=true;
  ensureCtx();
  const mg=ctx.createGain();mg.gain.value=.7;mg.connect(ctx.destination);
  [[220,.12],[329.6,.07],[261.6,.06],[440,.03]].forEach(([f,v],i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type="sine";o.frequency.value=f;o.detune.value=i*6;
    g.gain.setValueAtTime(0,ctx.currentTime);g.gain.linearRampToValueAtTime(v,ctx.currentTime+1.8);
    o.connect(g);g.connect(mg);o.start();
    g.gain.setValueAtTime(v,ctx.currentTime+5.8);g.gain.linearRampToValueAtTime(0,ctx.currentTime+7.8);
    setTimeout(()=>{try{o.stop()}catch(e){}},7900);
  });
}}
document.addEventListener("click",ensureCtx,{once:true});
document.addEventListener("touchstart",ensureCtx,{once:true});

// ── Loading sequence ─────────────────────────────────────────────────
function fadeEl(el,inOut,ms){el.style.transition=`opacity ${ms}ms ease`;el.style.opacity=inOut?"1":"0"}
const HOLD=2700,FADE=520;
window.addEventListener("load",()=>{
  syncOverlay();buildLightZones();buildDrips();
  const lt1=document.getElementById("lt1"),lt2=document.getElementById("lt2"),
        lt3=document.getElementById("lt3"),loading=document.getElementById("loading");
  setTimeout(()=>{fadeEl(lt1,true,FADE);tryIntro()},0);
  setTimeout(()=>{fadeEl(lt1,false,FADE)},HOLD);
  const t2=HOLD+FADE+80;
  setTimeout(()=>{fadeEl(lt2,true,FADE)},t2);
  setTimeout(()=>{fadeEl(lt2,false,FADE)},t2+HOLD);
  const t3=t2+HOLD+FADE+80;
  setTimeout(()=>{fadeEl(lt3,true,FADE);document.getElementById("bg").style.filter="brightness(1)"},t3);
  setTimeout(()=>{
    loading.style.transition="opacity 1.3s ease";loading.style.opacity="0";
    setTimeout(()=>{loading.style.display="none";flyInPages();scheduleDrop()},1300);
  },t3+3100);

  // ── Bind stop-catcher AFTER DOM is ready (element placed after script tag) ─
  var _sc=document.getElementById("stop-catcher");
  if(_sc){
    _sc.addEventListener("click",   ()=>stopPlayback());
    _sc.addEventListener("touchend",e=>{e.preventDefault();stopPlayback();},{passive:false});
  }

  // Belt-and-suspenders: document capture phase — fires before any element handler
  function _stopIfPlaying(e){
    if(activePianoIdx<0)return;
    if(e.target.closest(".sp")||e.target.closest("#tap-overlay")||
       e.target.closest("#tap-card")||e.target.closest("#loading"))return;
    stopPlayback();
  }
  document.addEventListener("click",    _stopIfPlaying, true);
  document.addEventListener("touchend", _stopIfPlaying, true);

});

// ── TAP OVERLAY ──────────────────────────────────────────────────────
let tapPendingIdx = -1;
let tapBtnHandled = false;  // prevent touchend + click double-fire

function showTapOverlay(idx) {
  tapPendingIdx = idx;
  document.getElementById("tap-piece-title").innerHTML =
    PIECES[idx].title.split("\n").join("<br>");
  document.getElementById("tap-overlay").classList.add("active");
}
function hideTapOverlay() {
  document.getElementById("tap-overlay").classList.remove("active");
  tapPendingIdx = -1;
}

// ── Backdrop dismiss ─────────────────────────────────────────────────
// touchstart fires reliably on iOS for any element (click does not on plain divs)
document.getElementById("tap-overlay").addEventListener("touchstart", e => {
  if (e.target.closest("#tap-card")) return;
  e.preventDefault();
  hideTapOverlay();
  if (activePianoIdx >= 0) stopPlayback(); // exit to default room state
}, {passive: false});

// click fallback for desktop
document.getElementById("tap-overlay").addEventListener("click", e => {
  if (!e.target.closest("#tap-card")) {
    hideTapOverlay();
    if (activePianoIdx >= 0) stopPlayback();
  }
});

// ── "Play Now" button ────────────────────────────────────────────────
// touchend fires before click and is reliable on iOS buttons.
// We resume the AudioContext here — must happen inside a user-gesture handler.
document.getElementById("tap-play-btn").addEventListener("touchend", e => {
  e.preventDefault();       // prevents the ghost click that would follow
  e.stopPropagation();      // don't let the backdrop touchstart see this
  tapBtnHandled = true;
  const idx = tapPendingIdx;
  hideTapOverlay();
  if (idx < 0) { tapBtnHandled = false; return; }
  // Resume AudioContext (required on iOS before any audio can start)
  ensureCtx();
  const doPlay = () => { playTrack(idx); };
  if (ctx && ctx.state === "suspended") {
    ctx.resume().then(doPlay).catch(doPlay);
  } else {
    doPlay();
  }
  setTimeout(() => { tapBtnHandled = false; }, 600);
});

// click fallback for desktop (skipped if touchend already handled it)
document.getElementById("tap-play-btn").addEventListener("click", e => {
  if (tapBtnHandled) return;
  e.stopPropagation();
  const idx = tapPendingIdx;
  hideTapOverlay();
  if (idx >= 0) playTrack(idx);
});

// ── STOP PLAYBACK ─────────────────────────────────────────────────────
function stopPlayback() {
  if (activePianoIdx < 0) return;
  const prev = activePianoIdx;
  activePianoIdx = -1;
  hidePianoPage();
  setTimeout(() => restoreFloorPage(prev), 300);
  // Stop synth oscillators
  stopSynth();
  if (activeGain) {
    try {
      // Cancel any pending automation, then ramp quickly to silence
      activeGain.gain.cancelScheduledValues(ctx.currentTime);
      activeGain.gain.setValueAtTime(activeGain.gain.value, ctx.currentTime);
      activeGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.7);
    } catch(e) {}
    const dyingGain = activeGain;
    activeGain = null;
    // Disconnect after fade to free resources
    setTimeout(() => { try { dyingGain.disconnect(); } catch(e) {} }, 800);
  }
  // Stop real audio tracks with quick fade
  [aA, aB].forEach(a => {
    if (!a.paused) {
      const startVol = a.volume;
      let t = 0;
      const iv = setInterval(() => {
        t += 0.05;
        a.volume = Math.max(0, startVol * (1 - t / 0.7));
        if (t >= 0.7) { clearInterval(iv); a.pause(); a.volume = 1; }
      }, 50);
    }
  });
  document.getElementById("np").style.opacity = "0";
  document.getElementById("stop-catcher").style.display="none"; // disable catcher
}


</script>

<!-- Mobile tap-to-play overlay -->
<div id="tap-overlay">
  <div id="tap-card">
    <div id="tap-piece-title"></div>
    <button id="tap-play-btn">Play&nbsp;Now</button>
  </div>
</div>

<div id="stop-catcher"></div>
</body>
</html>
